name: Nightly Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NIGHTLY_TAG: nightly
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            arch: x64
            classifier: win
            artifact_type: nsis
          - os: ubuntu-22.04
            name: Linux
            arch: x64
            classifier: linux
            artifact_type: deb
          - os: macos-latest
            name: macOS-ARM
            arch: aarch64
            classifier: mac-aarch64
            artifact_type: dmg
          - os: macos-latest
            name: macOS-x64
            arch: x64
            classifier: mac
            artifact_type: dmg

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          architecture: ${{ matrix.arch }}
          cache: maven

      - name: Verify Java Runtime
        shell: bash
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Maven ==="
          mvn -version

      - name: Build with Maven
        shell: bash
        run: mvn clean package -DskipTests -Djavafx.platform=${{ matrix.classifier }}

      - name: Prepare Package Input
        shell: bash
        run: |
          mkdir -p package-input
          cp target/Yass-Reloaded.jar package-input/
          [ -d "lib" ] && cp lib/*.jar package-input/ || true

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Build Windows Installer (NSIS)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage --type app-image --dest dist-img --name "yass" --main-jar Yass-Reloaded.jar --input package-input --icon "src/yass/resources/icons/yass-multi-icon.ico"
          & "C:\Program Files (x86)\NSIS\makensis.exe" nsis-installer.nsi
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item yass.exe dist\yass-nightly-installer.exe
          Copy-Item package-input\Yass-Reloaded.jar dist\Yass-Reloaded-nightly.jar

      - name: Build Linux/macOS Package
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          EXTRA_OPTS=""
          TARGET_FILE=""

          if [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            EXTRA_OPTS="--linux-package-deps ffmpeg,aubio-tools"
            TARGET_FILE="dist/yass-linux-amd64-nightly.deb"
          elif [ "${{ matrix.name }}" == "macOS-ARM" ]; then
            TARGET_FILE="dist/yass-macos-arm64-nightly.dmg"
          else
            TARGET_FILE="dist/yass-macos-x64-nightly.dmg"
          fi

          jpackage \
            --type ${{ matrix.artifact_type }} \
            --dest dist \
            --name "Yass-Reloaded" \
            --main-jar Yass-Reloaded.jar \
            --main-class yass.YassMain \
            --input package-input \
            --vendor "DoubleDee" \
            $EXTRA_OPTS

          GENERATED_FILE=$(find dist -maxdepth 1 -type f \( -name '*.deb' -o -name '*.dmg' \) | head -n 1)
          mv "$GENERATED_FILE" "$TARGET_FILE"

          if [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            cp package-input/Yass-Reloaded.jar dist/Yass-Reloaded-nightly.jar
          fi

      - name: Upload Nightly Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.classifier }}
          path: dist/*

  build-linux-nix:
    name: Build Linux (Nix)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Linux package with Nix
        shell: bash
        run: |
          nix build --option sandbox false .#packages.x86_64-linux.default

      - name: Archive Nix package
        shell: bash
        run: |
          mkdir -p dist
          tar --dereference -czf dist/yass-linux-x86_64-nightly-nix.tar.gz result

      - name: Upload Nix Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-nix
          path: dist/yass-linux-x86_64-nightly-nix.tar.gz

  publish-nightly:
    name: Publish Nightly Release
    runs-on: ubuntu-22.04
    needs:
      - build
      - build-linux-nix

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: nightly-artifacts
          merge-multiple: true

      - name: Prepare Release Notes
        shell: bash
        run: |
          cat > nightly-notes.md <<EOF
          Automated nightly build from \`${{ github.ref_name }}\`.

          Commit: \`${{ github.sha }}\`
          Built from: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This channel is intended for testing and may contain unfinished or unstable changes.
          EOF

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          name: Nightly Build
          body_path: nightly-notes.md
          prerelease: true
          draft: false
          make_latest: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          append_body: false
          files: nightly-artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
